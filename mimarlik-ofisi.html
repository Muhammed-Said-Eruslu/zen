<!doctype html>

    <header class="site-header">
      <div class="header-inner">

    <main>
      <section class="section">
        <div class="container">
          <header class="section-head">
            <p class="eyebrow">Proje</p>
            <h1 class="page-title">Mimarlık Ofisi</h1>
            <p class="lead">
              Render kullanılmadan, gerçek fotoğraf ve planlar üzerinden sunum
              yapılmıştır.
            </p>
          </header>

          <article class="content-block">
            <h2>Mekân Fotoğrafları</h2>
            <div class="gallery-grid">
              <figure class="gallery-item">
                <img
                  src="https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1200&q=80"
                  alt="Mimarlık ofisi genel görünüm"
                  loading="lazy"
                  decoding="async"
                />
              </figure>
              <figure class="gallery-item">
                <img
                  src="https://images.unsplash.com/photo-1497215842964-222b430dc094?auto=format&fit=crop&w=1200&q=80"
                  alt="Mimarlık ofisi çalışma alanı"
                  loading="lazy"
                  decoding="async"
                />
              </figure>
              <figure class="gallery-item">
                <img
                  src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1200&q=80"
                  alt="Mimarlık ofisi toplantı alanı"
                  loading="lazy"
                  decoding="async"
                />
              </figure>
            </div>
          </article>

          <article class="content-block">
            <h2>Plan</h2>
            <div class="single-image">
              <img
                src="https://images.unsplash.com/photo-1487958449943-2429e8be8625?auto=format&fit=crop&w=1700&q=80"
                alt="Ofis planı"
                loading="lazy"
                decoding="async"
              />
            </div>
          </article>

          <article class="content-block">
            <h2>Malzeme ve Detay</h2>
            <div class="gallery-grid">
              <figure class="gallery-item">
                <img
                  src="https://images.unsplash.com/photo-1486946255434-2466348c2166?auto=format&fit=crop&w=1200&q=80"

                  loading="lazy"
                  decoding="async"
                />

              <figure class="gallery-item">
                <img

                  src="https://images.unsplash.com/photo-1479839672679-a46483c0e7c8?auto=format&fit=crop&w=1200&q=80"
                  alt="Malzeme ve detay 3"
                  loading="lazy"
                  decoding="async"
